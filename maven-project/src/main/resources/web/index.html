<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur d'horaires</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="form-container">

    <section class="form-section">
        <h2>Ajout d'un cours</h2>
        <div class="course-base-info">
            <div class="inline-group">
                <label for="sigleCours">Sigle :</label>
                <input type="text" id="sigleCours" placeholder="ex: MAT1000">
            </div>
            <div class="inline-group">
                <label for="nomCours">Nom :</label>
                <input type="text" id="nomCours" placeholder="ex: Analyse 1">
            </div>
            <div class="inline-group">
                <label for="coursObligatoire">Obligatoire :</label>
                <input type="checkbox" id="coursObligatoire">
            </div>
        </div>

        <div id="groupsContainer">
        </div>

        <div class="button-group">
            <button type="button" onclick="addGroup()">+ Ajouter un groupe</button>
            <button type="button" onclick="submitCourse()">Ajouter au tableau</button>
        </div>
    </section>

    <section class="table-section">
        <h2>Liste des cours</h2>
        <div class="courses-board">
            <div class="course-column">
                <h3>Obligatoires</h3>
                <ul id="mandatoryList"></ul>
            </div>
            <div class="course-column">
                <h3>Optionnels</h3>
                <ul id="optionalList"></ul>
            </div>
        </div>

        <div id="detailsContainer">
        </div>
    </section>

    <section class="generation-section">
        <h2>Génération de l'horaire</h2>
        <div class="generation-controls">
            <div class="inline-group">
                <label for="numOptionnels">Nombre de cours optionnels à inclure :</label>
                <input type="number" id="numOptionnels" name="numOptionnels" min="0" max="15" value="0">
            </div>

            <button type="button" onclick="sendBufferToJava()">Générer horaires</button>
        </div>
    </section>

    <section class="save-section">
        <div class="button-group">
            <button type="button" onclick="loadData()">Charger</button>
            <button type="button" onclick="saveData()">Sauvegarder</button>
            <button type="button" onclick="manageSaves()">Gérer les sauvegardes</button>
            <button type="button" onclick="confirmReset()">Réinitialiser</button>
        </div>
    </section>

</div>

<div class="horaires-container hidden">
    <div class="schedule-nav" id="scheduleNav"></div>

    <div class="schedule-grid" id="scheduleGrid"></div>

    <div id="noScheduleMessage" class="no-schedule-msg">
        <h2>Aucun horaire valide</h2>
    </div>

    <div class="button-group schedule-actions">
        <button type="button" onclick="returnToForm()">Modifier les cours</button>
        <button type="button" id="btnEffacer" onclick="deleteCurrentSchedule()">Effacer</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
